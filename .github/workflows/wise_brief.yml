name: Wise Brief — Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'   # 1:30 UTC = 7:00 AM IST

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore twscrape session cache
        uses: actions/cache@v4
        with:
          path: .twscrape
          key: twscrape-${{ runner.os }}-v1
          restore-keys: twscrape-${{ runner.os }}-

      - name: Run digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_ID: ${{ secrets.BUFFER_PROFILE_ID }}
          TWSCRAPE_USERNAME: ${{ secrets.TWSCRAPE_USERNAME }}
          TWSCRAPE_PASSWORD: ${{ secrets.TWSCRAPE_PASSWORD }}
          TWSCRAPE_EMAIL: ${{ secrets.TWSCRAPE_EMAIL }}
          TWSCRAPE_EMAIL_PASSWORD: ${{ secrets.TWSCRAPE_EMAIL_PASSWORD }}
          TWSCRAPE_AUTH_TOKEN: ${{ secrets.TWSCRAPE_AUTH_TOKEN }}
          TWSCRAPE_CT0: ${{ secrets.TWSCRAPE_CT0 }}
        run: python main.py --digest
